name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: "Release version (for example, 0.1.0)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: maven-central
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Resolve release version
        shell: bash
        id: resolve-version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.releaseVersion }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          VERSION="${VERSION#v}"

          if [ -z "$VERSION" ]; then
            echo "releaseVersion is required. Pass workflow_dispatch input releaseVersion."
            exit 1
          fi

          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
      - name: Prepare Maven Central credentials
        shell: bash
        env:
          POM_NAME: ${{ vars.POM_NAME }}
          POM_DESCRIPTION: ${{ vars.POM_DESCRIPTION }}
          POM_INCEPTION_YEAR: ${{ vars.POM_INCEPTION_YEAR }}
          POM_URL: ${{ vars.POM_URL }}
          POM_LICENSE_NAME: ${{ vars.POM_LICENSE_NAME }}
          POM_LICENSE_URL: ${{ vars.POM_LICENSE_URL }}
          POM_LICENSE_DIST: ${{ vars.POM_LICENSE_DIST }}
          POM_DEVELOPER_ID: ${{ vars.POM_DEVELOPER_ID }}
          POM_DEVELOPER_NAME: ${{ vars.POM_DEVELOPER_NAME }}
          POM_DEVELOPER_URL: ${{ vars.POM_DEVELOPER_URL }}
          POM_SCM_URL: ${{ vars.POM_SCM_URL }}
          POM_SCM_CONNECTION: ${{ vars.POM_SCM_CONNECTION }}
          POM_SCM_DEV_CONNECTION: ${{ vars.POM_SCM_DEV_CONNECTION }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: |
          cat > .env <<EOF
mavenCentralUsername=$MAVEN_CENTRAL_USERNAME
mavenCentralPassword=$MAVEN_CENTRAL_PASSWORD
signingInMemoryKey=$SIGNING_KEY
signingInMemoryKeyId=$SIGNING_KEY_ID
signingInMemoryKeyPassword=$SIGNING_KEY_PASSWORD
POM_NAME=${POM_NAME:-KoraFX}
POM_DESCRIPTION=${POM_DESCRIPTION:-KoraFX JavaFX helper library}
POM_INCEPTION_YEAR=${POM_INCEPTION_YEAR:-2026}
POM_URL=${POM_URL:-https://github.com/DaiYuANg/koraFX}
POM_LICENSE_NAME=${POM_LICENSE_NAME:-The Apache License, Version 2.0}
POM_LICENSE_URL=${POM_LICENSE_URL:-https://www.apache.org/licenses/LICENSE-2.0.txt}
POM_LICENSE_DIST=${POM_LICENSE_DIST:-repo}
POM_DEVELOPER_ID=${POM_DEVELOPER_ID:-DaiYuANg}
POM_DEVELOPER_NAME=${POM_DEVELOPER_NAME:-DaiYuANg}
POM_DEVELOPER_URL=${POM_DEVELOPER_URL:-https://github.com/DaiYuANg}
POM_SCM_URL=${POM_SCM_URL:-https://github.com/DaiYuANg/koraFX}
POM_SCM_CONNECTION=${POM_SCM_CONNECTION:-scm:git:https://github.com/DaiYuANg/koraFX.git}
POM_SCM_DEV_CONNECTION=${POM_SCM_DEV_CONNECTION:-scm:git:ssh://git@github.com/DaiYuANg/koraFX.git}
EOF
      - name: Publish to Maven Central
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache -PreleaseVersion=${{ env.RELEASE_VERSION }}
